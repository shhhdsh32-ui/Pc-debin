name: Chrome Remote Desktop

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Install Chrome Remote Desktop
      run: |
        sudo apt update
        sudo apt install -y wget curl
        wget https://dl.google.com/linux/direct/chrome-remote-desktop_current_amd64.deb
        sudo apt install -y ./chrome-remote-desktop_current_amd64.deb

    - name: Setup Desktop
      run: |
        sudo apt install -y xfce4 xfce4-goodies

    - name: Start CRD
      run: |
        DISPLAY= /opt/google/chrome-remote-desktop/start-host --code="4/0AfrIepC89UdGBXljI5ElxGCvoiIywlkFtTebBox9rfqdU-MWflalHz66N9YVWVUp7EbgZQ" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name=$(hostname)
